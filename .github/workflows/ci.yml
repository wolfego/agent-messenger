name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18, 22]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Dolt
        uses: sebhoss/dolt-installer@v1

      - name: Install Beads (bd) — best effort
        continue-on-error: true
        run: npm install -g @beads/bd

      - name: Check tool versions
        run: |
          node --version
          dolt version
          bd --version || echo "bd not available — integration tests will skip"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  pack:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm run build

      - name: npm pack
        run: npm pack

      - name: Install from tarball
        run: |
          TARBALL=$(ls cursor-claude-messenger-*.tgz)
          npm install -g "$TARBALL"

      - name: Verify CLI is available
        run: agent-messenger help
